name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

# Run the bundled JS actions (checkout, upload/deploy-pages) on Node 24 now,
# ahead of GitHub forcing it on 2026-06-16. Silences the Node 20 deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: butter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export -p web

      - name: Add SPA fallback + Pages glue
        # inject-web-head adds the apple-touch-icon + manifest tags (output:single
        # ignores +html.tsx); 404.html lets deep links (e.g. /category/[id]) resolve
        # to the SPA; .nojekyll stops Pages from stripping the _expo/ asset folder.
        run: |
          node scripts/inject-web-head.mjs
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: butter/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
